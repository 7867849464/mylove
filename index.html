<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>屠新宇与孙睿颖的故事</title>
    <style>
        :root {
            --h: 800px;
            --blue: #92CBCA;
            --blue-dark: #7FBFBA;
            --gap-text: 40px;
            --gap-time: calc(120px + var(--gap-text) / 2);
        }

        * {
            margin: 0;
            padding: 0;
        }

        .daibiao {
            width: 100%;
            height: 50px;
            line-height: 50px;
            background-color: var(--blue);
            color: white;
            text-align: center;
            margin: 0 auto 0;
            clear: both;
            font-size: 1.6em;
        }

        #timeline {
            position: relative;
            margin: 0px auto;
            padding: 20px;
            height: var(--h);
            box-sizing: border-box;
        }

        #timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            width: 2px;
            height: calc(var(--h) - 40px);
            background: var(--blue-dark);
        }

        #timeline ul {
            margin: 0;
            padding: 0;
        }

        #timeline ul li {
            list-style: none;
            line-height: normal;
            position: relative;
            width: 50%;
            box-sizing: border-box;
        }

        #timeline ul li:nth-child(odd) {
            float: left;
            text-align: right;
            clear: both;
            padding: 20px var(--gap-text) 20px 0;
        }

        #timeline ul li:nth-child(even) {
            float: right;
            text-align: left;
            clear: both;
            padding: 20px 0 20px var(--gap-text);
        }

        #timeline ul li:nth-child(odd)::before {
            content: '';
            position: absolute;
            top: 24px;
            right: -6px;
            width: 10px;
            height: 10px;
            background: var(--blue-dark);
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(71, 68, 59, 0.2);
        }

        #timeline ul li:nth-child(even)::before {
            content: '';
            position: absolute;
            top: 24px;
            left: -4px;
            width: 10px;
            height: 10px;
            background: var(--blue-dark);
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(71, 68, 59, 0.2);
        }

        #timeline ul li h3 {
            margin: 0;
            padding: 0;
            font-weight: 600;
            color: rgba(71, 68, 59, 1);
            font-size: 1.2em;
        }

        #timeline ul li p {
            margin: 10px 0 0;
            padding: 0;
            font-size: 1em;
            line-height: 1.2;
        }

        #timeline ul li p div {
            margin: 10px 0;
        }

        #timeline ul li .time h4 {
            margin: 0;
            padding: 0;
            font-size: 1em;
        }

        @media screen and (max-width: 580px) {
            :root {
                --gap-text: 20px;
            }

            #timeline ul li h3 {
                font-size: 1.1em;
            }

            #timeline ul li p {
                font-size: .8em;
            }

            #timeline ul li .time h4 {
                font-size: .9em;
            }

            #timeline {
                padding: 20px 5px;
            }
        }

        #timeline ul li:nth-child(odd) .time {
            position: absolute;
            top: 10px;
            right: calc(-1 * var(--gap-time));
            margin: 0;
            padding: 5px 15px;
            background: var(--blue);
            color: white;
            border-radius: 15px;
            box-shadow: 0 0 0 3px rgba(71, 68, 59, 0.2);
        }

        #timeline ul li:nth-child(even) .time {
            position: absolute;
            top: 10px;
            left: calc(-1 * var(--gap-time));
            margin: 0;
            padding: 5px 15px;
            background: var(--blue);
            color: white;
            border-radius: 15px;
            box-shadow: 0 0 0 3px rgba(71, 68, 59, 0.2);
        }

        #timeline ul li .time {
            font-size: .9em;
        }

        .add-link {
            text-align: center;
            margin-top: 20px;
        }

        .add-link button {
            background: var(--blue);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .add-link button:hover {
            background: var(--blue-dark);
        }

        .foot {
            margin: 30px;
            text-align: center;
            color: gray;
        }

        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 85%;
            max-width: 350px;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .modal-content textarea {
            min-height: 80px;
            resize: none;
        }

        .modal-btns {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        .modal-btns button {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #saveBtn {
            background: var(--blue);
            color: white;
        }

        #cancelBtn {
            background: #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="daibiao">我们的故事</h2>
        <p class="add-link">
            <button onclick="openModal()">➕ 添加新故事</button>
        </p>
        <div id="timeline">
            <ul id="ulul">
                <li id="loading">
                    <div class="content">
                        <h3>加载中</h3>
                        <p>从今天开始<br />记录每一点一滴吧</p>
                    </div>
                    <div class="time">
                        <h4>(≧◡≦)</h4>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <!-- 添加弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h3>记录我们的故事</h3>
            <input type="text" id="titleInput" placeholder="输入标题">
            <textarea id="contentInput" placeholder="输入内容..."></textarea>
            <div class="modal-btns">
                <button id="cancelBtn" onclick="closeModal()">取消</button>
                <button id="saveBtn" onclick="saveStory()">保存</button>
            </div>
        </div>
    </div>

    <div class="foot">
        <p>爱你，sry</p>
    </div>

    <script>
        // 格式化时间
        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 自动计算高度
        function evaluate_height() {
            const lis = document.querySelectorAll("#timeline > ul > li");
            let fullHeight = 0;
            lis.forEach(item => {
                fullHeight += item.getClientRects()[0].height;
            });
            fullHeight += 200;
            document.documentElement.style.setProperty('--h', String(Math.max(fullHeight, 800)) + 'px');
        }

        // 本地存储读取
        function getLocalStories() {
            const data = localStorage.getItem('our_story');
            return data ? JSON.parse(data) : [];
        }

        // 保存到本地
        function saveLocalStories(list) {
            localStorage.setItem('our_story', JSON.stringify(list));
        }

        // 初始数据（第一次打开时用）
        let defaultData = [
            {
                "id": 2,
                "time": 1774396800,
                "title": "txy与sry的故事",
                "content": "我们从此刻相遇，从此时间便有了故事"
            }
        ];

        let pageLock = false;

        // 初始化
        async function main() {
            let localData = getLocalStories();
            
            // 第一次打开，存入默认数据
            if (localData.length === 0) {
                localData = defaultData;
                saveLocalStories(localData);
            }

            const loadingElement = document.getElementById("loading");
            if (loadingElement) loadingElement.remove();

            rend_blocks(localData);
        }

        // 生成单条故事
        function generate_blocks(title, content, time) {
            const li = document.createElement("li");
            li.innerHTML = `
            <div class="content">
                <h3 class="t0"></h3>
                <p class="t1"></p>
            </div>
            <div class="time">
                <h4 class="t2"></h4>
            </div>
            `;
            function bind(name, val) {
                const geter = li.getElementsByClassName(name);
                if (geter.length === 1) {
                    geter[0].innerText = val;
                }
            }
            bind("t0", title);
            const contentList = content.split("\n");
            contentList.forEach(con => {
                const div = document.createElement("div");
                div.innerText = con;
                li.getElementsByClassName("t1")[0].appendChild(div);
            });
            bind("t2", time);
            return li;
        }

        // 渲染所有故事
        function rend_blocks(data) {
            const ul = document.getElementById("ulul");
            ul.innerHTML = '';
            data.forEach(item => {
                const myblock = generate_blocks(item.title, item.content, formatTimestamp(item.time * 1000));
                ul.appendChild(myblock);
            });
            evaluate_height();
            pageLock = false;
        }

        // ================== 新增功能：弹窗 ==================
        function openModal() {
            document.getElementById('addModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('titleInput').value = '';
            document.getElementById('contentInput').value = '';
        }

        // 保存新故事
        function saveStory() {
            const title = document.getElementById('titleInput').value.trim();
            const content = document.getElementById('contentInput').value.trim();
            
            if (!title || !content) {
                alert('请输入完整的标题和内容');
                return;
            }

            const now = Math.floor(Date.now() / 1000);
            const newStory = {
                id: Date.now(),
                time: now,
                title: title,
                content: content
            };

            // 读取本地数据并追加
            const data = getLocalStories();
            data.push(newStory);
            saveLocalStories(data);

            // 刷新页面
            rend_blocks(data);
            closeModal();
        }

        main();
    </script>
</body>
</html>
